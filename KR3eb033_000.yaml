front:
  text: 四言舉要類編自序蓋夫四言舉要出於月池翁而其論原於崔真人此推明內經一脈十變之法也明五臟之平脈分四季之時脈通二十八之體狀別奇經八脈交加中外之理可謂脈法盡之矣脈要精微論曰微妙在脈不可不察趙王曰神存於心手之間蓋其難也易氏曰九竅皆見於外者觀其證之變而有通塞之二候九臟皆藏於內者察其脈之動靜而有浮中沉三部嗚呼其要微矣余念上古良醫治疾未有不先診脈者自岐黃已然辨人鬼別男女特其粗爾微芒呼吸之間而生死輕重系焉如診病人之色不變而在死法中此脈病而形不病也故曰無數者同之有數者異之苟不明乎脈法則同者多矣叔和曰天雨下降溝渠溢滿聖人不能圖也脈絡流溢諸經不能復拘也然則經脈明而諸證無不可察亦可窮吾治之方矣所見諸家脈訣行於世者而世本絶不及四言舉要之精切也豫讀而珍之推為脈法之全蓋啓內經之鑰倒軒岐之篋盡出其祕以示人而惜乎人之都不知讀豈不能讀耶能讀之者止李延劉淵二賢而不無歧解非倒亂失次即荒唐間雜而其注又多有不善以致脈學愈闡愈昧求脈之道愈超愈蹶良由不解活法推源之故因是類編注解庶學者披卷瞭然是為序同治四年歲次乙丑仲秋玄庵山人謹書
