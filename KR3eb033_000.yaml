body:
  text: 考證諸書目黃帝素問崔真人脈訣孫真人千金方論扁鵲難經劉宗厚論證李東垣醫學發明華他脈經陳無擇論經通真子脈要新括金匱方論朱丹溪論證黎文濤決脈精要張氏類經楊仁齋脈論張仲景傷寒論注得效方論王叔和脈經戴同父脈訣刊誤巢氏病源潘碩甫論脈太倉公生死祕要聖濟經解靈樞經柳氏論證脈學類編類編名義類編者合兩篇而匯其類所以簡而明也兩篇者崔紫虛脈訣李瀕湖脈學總曰舉要舉者舉其提綱挈領包源若一之法要者其玄祕須知精粹總括之妙操觚者執是編而習之則庶乎其不差矣舉要脈乃血脈氣血之先血之隧道氣息應焉脈者氣血之神邪正之鑑也有諸中必形諸外華元化曰氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血弱則脈微氣血平則脈緩是也潘石甫曰人身之血猶夫水也血中之脈猶夫派也派通則水源活脈通則氣血行隧伏道也脈行伏道之中其行也以息往來然非呼吸不能行故曰氣息應焉其象法地血之府也心之合也皮之部也脈者如水潛行地中之象也經曰脈者血之府也心主血而合脈惟外可見者如手魚之絡屬陽明此皮之部也其色多青則痛多黑則痹黃赤則熱多白則寒五色互見則主寒熱也資始於腎資生於胃脈由氣血而賦形者也其水穀日進脾胃醞釀化其精微而為血注之於脈潛滋暗長脈道得以充實豈非資生於胃乎熟腐水穀遊溢精氣全賴命門一點真陽豈非資生於腎乎陽中之陰本乎營衛營者陰血衛者陽氣營行脈中衛行脈外脈不自行隨氣而至氣動脈應陰陽之平氣如橐籥血如波瀾血脈氣息上下循環脈者非氣非血其猶氣血之橐籥也如大波之渙瀾也營屬陰而主裡衛為陽而主表故營在脈中衛在脈外是以經脈流通必由乎氣相隨上下運行不息而形體得以常存者亦藉此之榮也十二經中皆有動脈惟手太陰寸口處決此經屬肺上至魚際脈之大會息之出入一呼一息四至為息難經曰十二經中皆有動脈獨取寸口以決夫五臟六腑死生吉凶之法何謂也曰寸口者脈之大會五臟六腑之所以終始也出氣曰呼入氣曰吸一呼一吸總名一息四至也十二時辰三千五百一呼一吸脈行六寸日夜不停病為取缺十二辰即十二支也在月為建在日為時日以百刻為度每一刻脈行一百三十五息十刻脈行一千三百五十息百刻脈行一萬三千五百息人之宗氣積於胸中以行呼吸而通經脈也凡一呼一吸是為一息脈氣行六寸十息脈氣行六尺其日行之數當以周天二十八宿宿三十六分相因以每日共得一千零八分之數為實以一萬三千五百息為法除之則每十息日行止七釐四毫六絲六忽不盡此晝夜水漏下百刻之數亦合人身脈度也初持脈時令仰其掌掌後高骨是為關上關前為陽關後為陰陽寸陰尺先後推尋持診也要診他人之脈令仰其掌以中指診彼掌後高骨之間是為關上次下食指於關前名曰寸口再下無名指於關後名曰尺澤關前為陽脈得寸內九分而浮關後為陰脈得尺內一寸而沉以關在其中矣其所以云尺寸者以內外本末對待為言而分其右也心肝居左心脈居左寸肝脈居左關脾肺居右肺脈居右寸脾脈居右關腎與命門居兩尺部腎有兩枚分居兩尺部其中命門者付診於右尺也其魄與神皆見寸口左主司宮右主司府脈要精微論曰左外以候心心藏神者也內以候膻中膻中者心之宮城也右外以候肺肺藏魄者也內以候胸中胸中者肺之府也左大順男右大順女本命扶合男左女右男子為陽左亦為陽女子為陰右亦為陰故男脈左手偏大為順女脈右手偏大為順關前一分入命之主左為人迎右為氣口靈樞終始篇曰陰者主臟陽者主腑陽受氣於四末陰受氣於五臟持其氣口人迎以知陰陽有餘不足平與不平天道舉矣內經以人迎之脈察六腑之陽氣口之脈察五臟之陰太陰陽明論曰太陰為之行氣於三陰陽明為之行氣於三陽皆言人迎為陽明之腑脈故主乎於表氣口為太陰之臟脈故主乎里蓋上古診法有三一以三部九候以診通身之病一以太陰陽明以診臟腑之氣一以人迎氣口以診陰陽之本也腎命決斷兩在關後人無二脈病死不愈關後尺部也二尺之間命門也經曰七節之旁中有小心正此之謂也其中所藏而蓄坎離之交媾為生氣之海為元陽之竇闢精血於子宮司人生之壽夭華元化曰腎者精神之舍性命之根十四難曰人有兩尺脈如樹有根人無兩尺脈如樹之無根矣男女脈同惟尺則異陽弱陰盛反此病至男女脈同同於定位惟尺則異異於生育男子為陽脈當寸強尺弱女子為陰脈當寸微尺盛反此則病脈有七診曰浮中沉上下左右消息求尋七診者然九候之中而復有七診之法也如獨大獨小獨疾獨遲獨熱獨寒獨陷下者皆病脈也謂其或在上或在下或在左或在右之不同也又有九候舉按輕重三部浮沉各候五動十八難曰三部者寸關尺也九候者浮中沉也診脈惟在指法之巧曰舉曰按曰尋大法輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋人臂長當疏排指人臂短當密排指五動者當從心肺俱浮肝腎俱沉脾在中州則與叔和之守寸關尺寄位以候五臟六腑者正有相成之妙寸候胸上寸主上焦故候胸膈以上至頭之有疾關候膈下關主中焦故候胸膈以下至臍之有疾尺候於臍下至跟踝尺主下焦故候於臍以下至足有疾左脈候左右脈候右病隨所在不病者否難經曰脈有逆順男女有恆而反者何謂也然男子生於寅寅屬木陽也女子生於申申屬金陰也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也反者男得女脈女得男脈也男得女脈為不足病在內也左得之病在左右得之病在右隨脈言之也女得男脈為太過病在四肢左得之病在左右得之病在右隨脈言之此之謂也按寅申之説他書無考推越人之意倘亦以男為陽為火而火生在寅女為陰為水而水生於在申云耳火炎上故男脈盛在關上水潤下故女脈盛在關下也男得女脈者謂寸弱而尺盛此謂不足病在內也女得男脈者謂寸盛而尺弱此謂太過病在四肢非病在外之説也蓋男子以陽為主女子以血本非男女經脈有別也從其陰陽以察其盛衰也浮為心肺浮脈屬陽心為陽中之陽肺為陽中之陰沉為腎肝沉脈屬陰腎為陰中之陰肝為陰中之陽脾胃中州浮沉之間脾胃屬土土居中也浮沉之間陰陽和平之脈也謂浮中沉候五臟之説本乎天者親上本乎地者親下心肺居於至高之分故應乎浮肝腎處乎至陰之位故應乎沉脾胃在中不離中部大都脈代時宜無太過無不及自有一種雍容和緩之狀便是胃氣之脈心脈之浮浮大而散心合脈心脈循血而行脈者指法如六菽之重按至血脈而得為浮稍加力脈道粗者為大又稍加力脈道濡潤者為散乃心之帶胃氣而神應者也肺脈之浮浮澀而短肺合皮毛肺脈循皮毛而行脈者指法如三菽之重按至皮毛而得為浮稍稍加力脈道不利為澀又稍加力脈道不及本位為短乃肺之帶胃氣而神應者也肝脈之沉沉而弦長肝合筋肝脈循筋而行脈者指法如十二菽之重按至筋而得為沉稍加力脈道如箏弦者為弦次稍加力脈道迢迢者為長乃肝之帶胃氣而神應者也腎脈之沉沉滑而濡腎合骨腎脈循骨而行脈者指法如十五菽之重按至骨而得為沉舉指來疾流利者為滑次重按之脈道無力為濡乃腎之帶胃氣而神應者也脾胃屬土脈宜和緩脾胃合肌肉脾胃脈循肌肉而行脈者指法如九菽之重按至肌肉而得一種雍容和緩之氣乃胃氣之常而神應者也命為相火左寸同斷命門名相火付診於右尺而左寸心脈也靈蘭祕典曰膻中者臣使之官喜樂出焉今考心胞臟居鬲膈上經始胸中正值膻中之所位居相火代君行事實臣使也內經發明火義而以君相明位四字為目此四字個個著實是誠至道之綱領有不可不闡揚其精義者亦何以見之蓋君道惟神其用在虛相道惟力其用在實故君之能神者以其明也相之能力者以其位也明者明於上為化育之元主位者位於下為神明之洪基此君相相成之大道而有此天不可無此地有此君不可無此相也明矣春弦夏洪秋毛冬石四季和緩是為平脈太過實強病生於外不及虛微病生於內春弦者肝脈也東方木也萬物之所以始生也其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中夏洪者心脈也南方火也萬物之所以盛長也其氣來盛去衰故曰洪反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中秋毛者肺脈也西方金也萬物之所以收成也其氣來輕虛以浮來急去散故曰毛反此者病其氣來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中冬石者腎脈也北方水也萬物之所以合藏也其氣來沉而堅搏故曰石反此者病其氣來如彈石此謂太過病在外其氣來如數者此謂不及病在中春得為秋脈死在金日五臟準此推之不失人之臟氣喜所生而畏所克如春令肝臟木旺之時其脈當弦長今反浮澀而短是金來剋木期其在庚申辛酉日金旺之時必死餘臟仿此四時百病胃氣為本人生所賴者水穀故胃氣以水穀為本終始篇曰邪氣來也緊而疾穀氣來也徐而和是皆胃氣之謂脈貴有神不可不審調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數則為熱轉遲轉冷轉數轉熱醫家調息之法以自己呼吸而定他人之脈也其法以一呼脈再動一吸脈亦再動呼吸定息總名一息四至閏以太息謂之五至也東垣曰不病之脈不求其神而神無不在也有病之脈則當求其神如六數七疾熱也脈中有力即有神矣為泄去其熱則愈三遲二損寒也脈中有力即有神矣為散去其寒則安若無力即無神矣何以泄熱而散寒乎苟不知此而泄去之散去之神將何恃而生耶遲數既明浮沉分別此診脈辨證之法也如上文遲數既明則當別浮沉表裡相兼之用如浮數表熱沉數里熱浮遲表虛沉遲冷結可謂脈法得之耳浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜憂怒思悲恐驚外因於天者天有六氣謂寒暑燥濕風火是也內因於人者如陰陽應象大論曰心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐此外尚有病悲者曰肝悲哀動里則傷魂悲傷於肝也有病為驚者曰東方色青入通於肝其病發驚駭以肝應東方風木風主震動而連乎膽也有曰陽明所謂甚則厥聞木音則惕然而驚者肝邪乘胃也有曰驚則心無所倚神無所歸者心神散失也此肝膽胃心皆能病於驚也由此觀之是情志之所傷雖五臟各有所主然其所由則無不從心而發本神篇曰心怵惕思慮由則傷神神傷則恐懼自失邪氣臟腑病形篇曰憂愁恐懼則傷心口問篇曰悲哀憂愁則心動心動則五臟六腑皆搖可見心為五臟六腑之大主而總統魂魄兼該志意故憂動於心則肺應思動於心則脾應怒動於心則肝應恐動於心則腎應所以五志惟心所使也設能善養其心居處安靜無為懼懼無為欣欣婉然從物讓而不爭與時變化空諸所礙則志意順精神專值悔怒不起魂魄不散五臟調和邪亦安從奈我哉外因之浮則為表證沉里遲陰數則陽盛浮則為表沉則為里遲則為陰數則為陽此外因之綱領也內因之浮虛風所為沉氣遲冷數熱何疑仲景曰風則浮虛沉潛水蓄遲則為冷數則熱煩此內因之綱領也浮數表熱沉數里熱浮遲表虛沉遲里結表裡陰陽風氣冷熱辨外內因脈證參別脈理浩繁總括於四既得提綱引申觸類浮沉遲數乃脈之綱領也總結上文下引李瀕湖脈學詩抄八十二首浮脈法天輕手可得汛汛在上如水漂木浮脈陽浮脈舉之有餘按之不足脈經如微風吹鳥背上毛厭厭聶聶如循榆莢素問如水漂木崔氏如捻蔥葉黎氏浮脈法天有輕清在上之象在卦為乾在時為秋在人為肺體狀詩浮脈惟從肉上行如循榆莢似毛輕三秋得令知無恙久病逢之卻可驚相類詩浮如木在水中浮浮大中空乃是芤拍拍而浮是洪脈來時雖盛去時悠浮脈輕平似捻蔥虛來遲大豁然空浮而柔細方為濡散似楊花無定蹤主病詩浮脈為陽表病居遲風數熱緊寒拘浮而有力多風熱無力而浮是血虛寸浮頭痛眩生風或有風痰聚在胸關上土衰兼木旺尺中溲便不流通有力洪大來盛去悠洪脈陽洪脈指下極大脈經來盛去衰素問來大去長通真子洪脈在卦為離在時為夏在人為心素問謂之大亦曰鉤滑氏曰來盛去衰如鉤之曲上而復下應血脈來去之象像萬物敷布下垂之狀體狀詩脈來洪盛去還衰滿指滔滔應夏時若在春秋冬月分升陽散火莫狐疑相類詩洪脈來時拍拍然去衰來盛似波瀾欲知實脈參差處舉按弦長愊愊堅主病詩脈洪陽盛血應虛相火炎炎熱病居脹滿胃翻須早治陰虛泄痢可愁虞寸洪心火上焦炎肺脈洪時金不堪肝火胃虛關內察腎虛陰火尺中看無力虛大遲而且柔虛脈陰虛脈遲大而軟按之無力隱指豁豁然空脈經體狀相類詩舉之遲大按之松脈狀無涯類谷空莫把芤虛為一例芤來浮大似慈蔥主病詩脈虛身熱為傷暑自汗怔忡驚悸多發熱陰虛須早治養營益血莫蹉跎血不營心寸口虛關中腹脹食難舒骨蒸痿痹傷精血卻在腎門兩尺居虛甚則散渙漫不收散脈陰散脈大而散有表無里脈經渙漫不收崔氏無統紀無拘束至數不齊或來多去少或去多來少渙散不收如楊花散漫之象産婦得之生孕婦得之墮柳氏戴同父曰心脈軟散怔忡肺脈軟散汗出肝脈軟散溢飲脾脈軟散跗腫此皆病脈也腎脈軟散諸病脈代散死脈也體狀詩散似楊花散漫飛去來無定至難齊産為生兆胎為墮久病逢之不必醫相類詩散脈無拘散漫然濡來浮細水中綿浮而遲大為虛脈芤脈中空有兩邊主病詩左寸怔忡右寸汗溢飲左關應軟散右關軟散胻胕跗腫散居兩尺魂應斷有邊無中其名曰芤芤脈陽中陰芤脈浮大而軟按之中央空兩邊實脈經中空外實狀如慈蔥素問戴同父曰營行脈中脈以血為形芤脈中空脫血之象也體狀詩芤形浮大軟如蔥按之傍有中央空火犯陽經血上溢熱侵陰絡下流紅相類詩中空傍實乃為芤浮大而遲虛脈呼芤更帶弦名曰革血亡空革血虛虛主病詩寸芤積血在於胸關上逢芤腸胃癰尺部見之多下血赤淋紅痢漏崩中浮小為濡綿浮水面濡脈陰濡音軟脈極軟而浮細如綿在水中輕手相得按之無有脈經體狀詩濡形浮細按之輕水面浮綿力不禁病後産中猶百藥平人若見是無根相類詩浮而柔細知為濡沉細而柔作弱持微則浮微如散絶細來沉細近於微主病詩濡為亡血陰虛病髓海丹田暗已虧汗雨夜來蒸入骨血山崩倒濕傷脾寸濡陽微自汗多關中其奈氣虛何尺傷精血虛寒甚溫補真陰可起疴濡甚則微不任尋按微脈陰微脈極細而軟按之如欲絶若有若無脈經細而稍長戴氏氣虛微則脈微素問體狀相類詩微脈輕微瞥瞥乎按之欲絶有如無微為陽弱細陰弱細比於微略較粗主病詩氣血微兮脈亦微惡寒熱汗淋漓男為勞極諸虛候女作崩中帶下醫寸微氣促或心驚關脈微時脹滿形尺部見之精血弱惡寒消疸痛呻吟沉脈法地近於筋骨沉脈陰沉脈重手按至筋骨乃得脈經如石投水必極其底沉脈法地有淵源在下之象在卦為坎在時為冬在人為腎體狀詩水行潤下脈來沉筋骨之間軟滑勻女子寸兮男子尺四時如此號為平相類詩沉幫筋骨自調勻伏則推筋著骨尋沉細如綿真弱脈弦長實大是牢形主病詩沉潛水蓄陰經病數熱遲寒滑有痰無力而沉虛與氣沉而有力積兼寒寸沉痰鬱水停胸關主中寒痛不通尺部濁遺並泄痢腎虛腰及下元痌深深在下沉極為伏伏脈陰伏脈重按著骨指下裁動脈經脈行筋下刊誤體狀詩伏脈推筋著骨尋指間裁動隱然深傷寒欲汗陽將解厥逆臍疼證屬陰相類詩見沉脈主病詩伏為霍亂吐頻頻腹痛多緣宿食停蓄飲老痰成積聚散寒溫里莫因循食鬱胸中雙寸伏欲吐不吐常兀兀當關腹痛困沉沉關後疝痛還破腹有力為牢實大弦長牢脈陰中陽牢脈似沉似伏實大而長微弦脈經體狀相類詩弦長實大脈牢堅牢位常居沉伏間革脈芤弦自浮起革虛牢實要詳看主病詩寒則牢堅里有餘腹心寒痛木乘脾疝㿗癥瘕何愁也失血陰虛卻忌之牢甚則實愊愊而強實脈陽實脈浮沉皆得脈大而長微弦應指然脈經體狀詩浮沉皆得大而長應指無虛愊愊弦熱蘊三焦成壯火通腸發汗始安康相類詩實脈浮沉有力強緊如彈索轉無常須知牢脈幫筋骨實大微弦更帶長主病詩實脈為陽火鬱成發狂譫語吐頻頻或為陽毒或傷食大便不通或氣疼寸實應知面熱風咽疼舌強氣填胸當關脾熱中宮滿尺屬腰腸痛不通無力為弱柔小如綿弱脈陰弱脈極軟而沉細按之乃得舉手無有脈經素問曰脈弱以滑是有胃氣脈弱以澀是謂久病病後老弱見之順平人少年見之逆仲景曰陽陷入陰故惡寒發熱弱主筋沉主骨陽浮陰弱血虛筋急柳氏曰氣虛則弱寸弱陽虛尺弱陰虛關弱胃虛體狀詩弱來無力按之柔柔細而沉不見浮陽陷入陰精血弱白頭猶可少年愁相類詩見濡脈主病詩弱脈陰虛陽氣衰惡寒發熱筋骨痿多驚多汗精神減益氣調營急早醫寸弱陽虛病可知關為胃弱與脾衰欲求陽陷陰虛病須把腎門兩尺推弱甚則細如蛛絲然細脈陰細脈小於微而常有細直而軟若絲線之應指脈經素問謂之小體狀詩細來纍纍細如絲應指沉沉無絶期春夏少年俱不利秋冬老弱卻相宜相類詩見微濡主病詩細脈縈縈血氣衰諸虛勞極七情乖若非濕氣侵腰腎即是傷精汗泄來寸細應知嘔吐頻入關腹脹胃虛形尺逢定是丹田冷泄痢遺精號脫陰遲脈屬陰一息三至遲脈陰遲脈一息三至去來極慢脈經遲為陽不勝陰故脈來不及體狀詩遲來一息至惟三陽不勝陰氣血寒但把浮沉分表裡消陰須益火之源相類詩脈來三至號為遲小駃於遲作緩持遲細百難知是澀浮而遲大以虛推主病詩遲司臟病或多痰沉痼癥瘕仔細看有力而遲為冷痛遲而無力定虛寒寸遲必是上焦寒關主中寒痛不堪尺是腎虛腰腳重溲便不禁疝牽丸少駃於遲緩不及四二損一敗病不可治兩息奪精脈已無氣緩脈陰緩脈去來少駃於遲脈經一息四至戴氏如絲在經不卷其軸應指和緩往來甚勻張太素如微風輕颭柳稍梢滑伯仁如初春楊柳舞風之象楊玄操緩脈在卦為坤在時為四季在人為脾陽寸陰尺上下同等浮大而軟無有偏勝者平脈也體狀詩緩脈阿阿四至通柳稍梢嫋嫋颭輕風欲從脈里求神氣只在從容和緩中相類詩見遲脈主病詩緩脈營里衛有餘或風或濕或脾虛上為項強下痿痹分別浮沉大小軀寸緩風邪項背拘關為風眩胃家虛腎門濡泄或風祕或是蹣跚足力迂浮大虛散或見芤革革脈陰革脈弦而芤仲景如按鼓皮丹溪時珍曰此即芤弦二脈相合故均主失血之候體狀主病詩革脈形如按鼓皮芤弦相合脈寒虛女人半産並崩漏男子營虛或夢遺相類詩見芤牢浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還澀脈陰澀脈細而遲往來難短且散或一止復來脈經參伍不調素問如輕刀刮竹脈訣如雨沾沙通真子如病蠶食葉澀主血少精傷之病女人有孕為胎病無孕為敗血體狀詩細遲短澀往來難散止依稀應指間如雨沾沙容易散病蠶食葉慢而艱相類詩參伍不調名曰澀輕刀刮竹短而難微似秒芒微軟甚浮沉不別有無間主病詩澀緣血少或傷精翻胃亡陽汗雨淋寒濕入營為血痹女人非孕即無經寸澀心虛痛背胸胃虛脅脹察關中尺為精血俱傷候腸結溲淋或下紅結則來緩止而復來結脈陰結脈往來緩時一止復來脈經越人曰結甚則積甚結微則積微浮結外有痛積伏結內有積聚結主陰盛之病體狀詩結脈緩而時一止獨陰偏盛欲亡陽浮為氣滯沉為積汗下分明在主張相類詩見代脈主病詩結脈皆因氣血凝老痰結滯苦沉吟內生積聚外癰腫疝瘕為殃病屬陰代則來緩止不能回代脈陰代脈動而中止不能自還因而復動仲景脈至還入尺良久方來吳氏體狀詩動而中止不能還復動因而作代看病後得之猶可療平人卻與壽相關相類詩數而時止名為促緩止須將結脈呼止不能回方是代結生代死自殊途主病詩代脈原因臟氣衰腹疼泄痢下元虧或為吐瀉中宮病女子懷胎三月兮數脈屬病六至一息七疾八極九至為脫數脈陽數脈一息六至脈經脈流薄疾素問數為陰不勝陽故脈來太過浮沉遲數脈之綱領素問脈經皆為正脈體狀詩數脈息間常六至陰微陽盛必狂煩浮沉表裡分虛實惟有兒童作吉看相類詩數比平人多一至緊來如數似彈繩數而時止名為促數見關中動脈形主病詩數脈為陽熱可知只將君病火來醫實宜涼瀉虛溫補肺病秋深卻畏之寸數咽喉口舌瘡吐紅咳嗽肺生瘍當關胃火併肝火尺屬滋陰降火湯浮大者洪沉大牢實往來流利是謂之滑滑脈陽中陰滑脈往來流利展轉替替然如珠之應指脈經漉漉如欲脫體狀相類詩滑脈如珠替替然往來流利卻還前莫將滑數為同類數脈惟看息至間主病詩滑脈為陽元氣衰痰生百病食生災上為吐逆下蓄血女脈不調定有胎寸滑膈痰生嘔吐吞酸舌強或咳嗽當關宿食肝脾熱濁痢㿗淋看尺部有力為緊彈如轉索緊脈陽緊脈往來有力左右彈人手素問數如切繩脈經如轉索無常仲景如紉簞絲丹溪諸緊為寒為痛人迎緊盛傷於寒氣口緊盛傷於食尺緊痛居其腹沉緊疾在其腰體狀詩舉如轉索切如繩脈象因之得緊名總是寒邪來作寇內為腹痛外腰疼相類詩見弦實主病詩緊為諸痛主於寒喘咳風癇吐冷痰浮緊表寒鬚髮越緊沉溫里自然安寸緊人迎氣口分當關心腹痛沉沉尺中有緊為陰冷定是奔豚與疝疼數見寸口有止為促促脈陽促脈來去數時一止復來脈經如蹶之趣徐疾不常黎氏促主陽盛之病促結之因皆有氣血痰鬱飲食五者之別一有留滯則脈必見止矣體狀詩促脈數而時一止此為陽極欲亡陰三焦鬱火炎炎盛進必無生退可去相類詩見代脈主病詩促脈惟將火病醫其因有五細推之時時喘咳皆痰積或發狂斑與毒疽數見關中動脈可候厥厥動搖狀如小豆動脈陽動脈乃數脈見於關上下無頭尾如豆大厥厥動搖脈經仲景曰動則為痛為驚陰陽相搏名曰動陽動汗出陰動發熱形冷惡寒此三焦傷也成無已曰陰陽相搏則虛者動故陽虛則陽動陰虛則陰動龐安常曰關前三分為陽關後三分為陰關位半陰半陽故動隨虛見素問曰陰虛陽搏謂之崩體狀詩動脈搖搖數在關無頭無尾豆形圓其原本是陰陽搏虛者搖兮勝者安相類詩見數脈主病詩動脈專司痛與驚汗因陽動熱因陰或為泄痢拘攣病男子遺精女子崩長則氣治過於本位長脈陽長脈不大不小迢迢自若朱氏如循長竿末稍梢為平如引繩為病素問體狀相類詩過於本位脈名長弦則非然但滿張弦脈與長爭較遠良工尺度自能量主病詩長脈迢迢大小勻反常為病似牽繩若非陽毒癲癇病即是陽明熱勢深長而端直弦脈應指弦脈陽中陰弦脈端直以長素問如張弓弦脈經狀若箏弦脈訣按之不移綽綽如按琴瑟弦巢氏從中直過挺然指下刊誤戴同父曰弦而軟其病輕弦而硬其病重一手見曰單絃兩手見曰雙弦此寒痼之脈弦脈在卦為震在時為春在人為肝輕虛以滑者平滑實如循長竿者病徑急如新張弓弦者死體狀詩弦脈迢迢端直長肝經木旺土應傷怒氣滿胸常欲叫翳矇瞳子淚淋浪相類詩弦來端直似絲絃緊則如繩左右彈緊言其力弦言象牢脈弦長沉伏間主病詩弦應東方肝膽經飲痰寒熱瘧纏身浮沉遲數須分別大小單雙有重輕寸弦頭痛膈多痰寒熱癥瘕察左關右關胃寒心腹痛尺中陰疝腳拘攣短則氣病不能滿部不見於關惟尺寸候短脈陰短脈不及本位脈訣應指而回不能滿部脈經戴同父曰短脈只見尺寸若關中見短上不通寸下不通尺是陰陽絶脈必死體狀相類詩兩頭促縮名為短澀短遲遲細且難短澀而浮秋喜見三春為賊有邪干主病詩短脈惟於尺寸尋短而滑數酒傷神浮為血澀沉為痞寸主頭疼尺腹疼切脈論證一脈一形各有主病數脈相兼則見諸證總結上文下切脈論證浮脈主表里必不足有力風熱無力血弱浮脈屬陽故主表舉之有餘按之不足浮而有力者則為風熱浮而無力者是血虛也浮遲風虛浮遲屬陰一息三至浮遲兼見風虛之候也浮數風熱數脈屬陽一息六至浮數兼見風熱之候也浮緊風寒緊脈如繩左右彈指浮緊兼見風寒之候也浮緩風濕緩脈去來少快於遲浮緩兼見風濕之候也浮虛傷暑舉之遲大按之無力浮虛兼見傷暑之候也浮芤失血中空外實狀似慈蔥浮芤兼見失血之候也浮洪虛熱洪脈來時滿指滔滔浮洪兼見虛熱之候也浮微勞極微脈軟細按之欲絶浮微兼見勞極之候也浮濡陰虛浮而柔細如綿在水浮濡兼見陰虛之候也浮散虛劇有表無里渙漫不收浮散兼見虛極之候也浮弦痰食端直以長狀若箏弦浮弦兼見痰食之候也浮滑痰熱往來流利漉漉欲脫浮滑兼見痰熱之候也沉脈主裡主寒主積有力食痰無力氣鬱沉脈屬陰故主裡按之有力舉之不足沉而有力者為痰飲食滯寒冷積聚等症沉而無力者則病諸氣憤郁也沉遲虛寒遲脈屬陰一息三至沉遲兼見虛寒之候也沉數熱伏數脈屬陰一息六至沉數兼見熱伏之候也沉緊冷痛緊脈如繩左右彈指沉緊兼見冷痛之候也沉緩水蓄緩脈去來少快於遲沉緩兼見水蓄之候也沉牢痼冷牢脈弦長實大而堅沉牢兼見痼冷之候也沉實熱極脈大而長愊愊應指沉實兼見熱極之候也沉弱陰虛沉細而柔則為弱脈沉弱兼見陰虛之候也沉細痹濕細直如絲應指無絶沉細兼見痹濕之候也沉弦飲痛端直以長狀若箏弦沉弦兼見飲痛之候也沉滑宿食往來流利漉漉欲脫沉滑兼見宿食之候也沉伏吐利陰毒聚積重按著骨指下裁動沉伏兼見陰毒聚積也遲脈主臟陽氣伏潛有力為痛無力虛寒遲為陽不勝陰故主臟遲而有力者為冷痛遲而無力者虛寒之候也數脈主腑主吐主狂有力為熱無力為痛數為陰不勝陽故主腑數而有力者為陽盛為實熱故主狂妄吐血等證數而無力者為口舌咽喉風火牙痛之候也滑脈主痰或傷於食下為蓄血上為吐逆數而流利謂之滑但滑而數大者內熱也上則為心肺頭目咽喉之熱故主吐逆等證下則為小腸膀胱二便之熱故主蓄血等證若弦滑則脾腎受傷多主陰虛痰火等證澀脈少血或中寒濕反胃結腸自汗吐逆不論男婦凡尺中沉澀者艱於子嗣正以血少精傷故女人懷孕而得澀脈則血不足以養胎如無孕而得澀脈將有陰衰髓竭之憂景嶽曰凡脈見澀者多由七情不遂營衛耗傷血無以充氣無以暢故主自汗在上則有反胃吐逆在下則有便結傷濕之確證弦脈主飲病屬膽肝弦數多熱弦遲多寒蓋弦為木化氣通於膽肝但弦而強徑者脾土必傷故主痰飲等證弦數者為陽邪多主熱病弦遲者為陰邪多主寒病也浮小支飲凡咳逆倚息氣喘不得臥其形若腫脈見浮小者此病支飲也沉小懸痛凡水飲後而水流在脅下咳唾引痛脈見沉小者此病懸痛也陽弦頭痛陰弦腹痛陽弦陰弦者謂寸為陽尺為陰也故寸部見之主頭痛尺部見之主腹痛緊脈主寒又主諸痛浮緊表寒沉緊里痛景嶽曰緊脈多陰少陽乃陰邪激搏之候故主寒主痛浮緊在表為傷寒發熱沉緊在裡為胸腹脅痛之候也長脈氣平長脈在時為春在卦為震在人為肝肝主春生之令天地之氣至此而發舒經曰長則氣治月池翁曰心脈長者神強氣壯腎脈長者蒂固根深皆言平脈也短則氣病經曰短則氣病蓋以氣屬陽主乎充沛若短脈獨見氣衰之確兆也然肺為主氣之臟偏與短脈相應何也經曰平脈來厭厭聶聶如落榆莢則短中自有和緩之象氣仍治也若短而沉且澀是氣不治而病也細則氣少匯辨云大都浮而細者屬之陽分則見自汗氣急等症沉而細者屬之陰分則見下血血痢等症大則病進經云形瘦脈大多氣者死以其氣方張也或雖未病而其脈大於診者所以逆知病之必進也浮長風癇浮長風邪之脈也故主風痰驚癇之候沉短宿食短脈有陽氣不充由胃氣厄塞不能條暢百脈或因痰氣食積阻礙氣道所致也血虛脈虛經曰血虛脈虛血來虛微為不及病在內也血實脈實經曰血實脈實血來實強為太過病在外也洪脈為熱其陰則虛洪脈為熱屢下不解謂之壞病不可救治洪為陽氣滿溢陰氣垂絶之脈也細脈為濕其血則虛胃虛少食冷涎泛逆便泄腹痛腳軟自汗失精皆有細脈主於濕病浮沉取之在陽為氣不足在陰為血不足也緩大者風若脈形長大而來去寬縱不前即張太素所謂如絲在經不卷其軸之謂是曰縱緩病主於熱而主於風也緩細者濕緩細者蓋血虛氣弱不足以充故為傷濕痹痛之病也緩澀血少肺之為臟氣多血少故右寸見之為合度之診腎之為臟專司精血故右尺見之為虛殘之候緩滑內熱夫脈之謂而不甚有力者皆浮滑濡滑微滑緩滑之類終非無力之比滑為血實氣壅之脈悉屬有餘濡小陰虛弱小陽竭陽竭惡寒陰虛發熱小細也浮細如綿曰濡沉細如綿曰弱濡主陰虛陰虛則發熱弱主陽竭陽竭則惡寒陽微惡寒陰微發熱男微虛損女微瀉血陽微陰微者謂浮為陽沉為陰也故浮微主惡寒沉微主發熱男主勞極諸虛女主崩中帶下陽動汗出陰動發熱為痛與驚崩中失血惟夫陽欲降而陰逆之陰欲升而陽逆之兩者逆之而成動脈之形著矣故陽動不能衛於外者則汗出陰動不能守於內者則發熱陰陽相搏心脾不安故為痛為驚為崩中失血之候虛寒相搏其名為革男子失精女子失血仲景曰弦則為寒芤則為虛虛寒相搏此名曰革男子亡血失精女子半産漏下陽盛則促肺癰瘍毒促為陽獨盛而陰不能和也為怒氣上逆為胸滿煩燥躁為血瘀發斑為狂妄為癰腫諸實熱之候陰盛則結疝瘕積鬱結為陰獨盛而陽不能入也為七情所郁為積聚疝瘕為寒飲死血為腹痛為癲癇諸留滯之候代則氣衰或瀉膿血傷寒心悸女胎三月滑伯仁曰無病而羸瘦脈代者危脈也若有病而氣血作損其氣不能續者只為病脈又妊婦脈代胎必三月脈之主病有宜不宜陰陽順逆凶吉可推診切之要順逆為寶若順逆不明則陰陽虛實死生吉凶之法莫別也中風浮緩急實則忌其證口噤不開喉內無聲手足厥冷而身不冷兩目上視此其候也浮滑中痰此證類似中風痰涎湧盛昏迷不醒人事口眼歪斜惟喉內有聲是其候也沉遲中氣中氣氣厥也如曠野新屋綿綿乎屬不滿日之所卒中天地不正之氣稟賦虛怯邪以乘之此謂陽神不聚其死在陰也尸厥沉滑卒不知人入臟身冷入腑身溫華元化曰邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸故名尸厥鬄左角之發方寸燔治飲以美酒一杯不能飲者灌之立已詳此尸厥一證乃外邪卒中之惡候凡四時不正之氣及山魔土煞五尸魘魅之屬皆能犯之者忽然手足厥冷肌膚寒促面目青黑精神不守或口噤妄言痰涎壅塞或旋運倒僕不省人事即名飛尸卒厥或針或灸如秦承祖灸鬼華他灸脫陽之法為妙凡用藥之法當知邪之所湊其氣必虛故以左角之血餘用補五絡之脫竭其義可知風傷於衛浮緩有汗寒傷於營浮緊無汗浮緩有汗者為傷風風傷於衛也浮緊無汗者為傷寒寒傷於營也暑傷於氣脈虛身熱暑病則傷氣而不傷形也若微涼外感則熱傷心胞必致惡寒發熱其脈則虛濕傷於血脈緩細澀濕之為病有出於天氣者傷於人皮肉筋脈之間雨霧之屬也地氣亦然泥水之屬也有出於飲食者酒酪之屬也在肌表則為發熱惡寒自汗在經絡則為痹重筋骨疼痛不能轉側四肢痿弱痠麻為胕腫為黃疸為嘔吐為脹滿為便澀為溏泄後重脫肛等證凡肌表經絡之病濕由外而入者也飲食氣血之病濕由內而生者也此其在外者為輕在內者為甚是固然矣然及其甚者則未有表濕而不連臟也里濕而不連經者此論濕病之變也傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見陰病必危殆陰病見陽雖困無害上不至關陰氣已絶下不至關陽氣已絶代脈止歇臟絶傾危散脈無根形損難醫傷寒熱病未得汗脈浮洪者為陽易已沉微澀小者為陰難已既得汗脈沉小安靜為順浮大躁疾者逆故南陽首言陽病見陰脈者死陰病見陽脈者生只此可推卒病之順逆可廣諸病之死生此著先機至顯至微矣上不至關者言尺脈上不能通於關故陰氣已絶下不至關者言寸脈下不能通於關故陽氣已絶古人以代散為必死之脈蓋散為腎敗之徵代脈為脾絶之候加之形脫如削者為不治飲食內傷氣口急滑經曰人迎緊盛傷於寒氣口緊盛傷於食凡氣口急滑而有力者為宿停滯澀伏模糊則為寒冷傷脾勞倦內傷脾脈大弱人之經營煩擾則肢體轉旋而過於勞者無不傷脾也太陰陽明論曰太陰為之行氣於三陰氣口為太陰之臟脈凡診於氣口脈虛大者為氣虛弦細或澀者為血虛若躁疾堅搏大汗出發熱不止者死以裡虛不宜復見表開泄也欲知是氣下手脈沉沉極則伏澀弱久深經曰天之在我者德也地之在我者氣也德流氣薄而生者也又曰百病生於氣也怒則氣上喜則氣散悲則氣消恐則氣陷寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣主病異同火鬱多沉滑痰緊食氣澀血芤數火細濕沉雖屬裡未必盡為陰寒但脈沉滑沉數者及有頭痛身熱正屬表邪火鬱所以脈沉也滑主多痰弦主留飲熱則滑數寒則弦緊浮滑兼風沉滑兼氣食傷短疾濕留濡細痰飲之為病必有所因而致之者或熱或寒或風或氣或食傷或濕氣停滯之類皆為痰之本也凡治痰不治痰之本非其治也所以治其本而成痰者而痰自清正以痰非病之本而痰為病之標耳瘧脈自弦弦數者熱弦遲者寒代散者截瘧疾之病本由外感內經論瘧無非曰風曰寒其義甚明察其症先發熱而後寒者寒病也先戰寒而後發熱者熱病也若陽陰倒亂則寒熱往來其治以截者則已故瘧病自陰而漸陽自遲而漸早者重亦漸輕不見也自陽而漸陰自早而漸遲者輕亦漸重愈甚也凡感邪深者其發必遲而多至隔日必使漸早漸近方是佳兆欲知其來所知其本矣泄瀉下痢沉小滑弱實大浮洪發熱則惡泄瀉下痢本屬傷陰耗里之證脈見沉小滑弱乃為相宜若實大浮洪此邪盛正虛加之發熱則惡矣嘔吐反胃浮滑者昌弦數緊澀結腸者亡嘔吐反胃之脈浮滑大便潤者順痰氣阻逆胃氣未艾也弦數緊澀涎如雞清大便燥結者逆氣血枯澀痰火鬱結也霍亂之候脈代勿訝厥逆遲微是則可怕霍亂乃卒然吐瀉而神氣昏悶脈有不續而見代者但俟里和而脈自出矣此非斷絶者比令勿驚訝若四肢厥冷是為陽衰陰盛真元漸絶之象則去生已遠恐驟脫難救又安得不怕乎咳嗽多浮聚肺關胃沉緊小危浮濡易治有聲無痰謂之咳有痰無聲謂之嗽有聲有痰此謂咳嗽者其證非止聚於肺而五臟皆有之其愈關於胃氣之有無也喘急息肩浮滑者順沉澀肢寒散脈逆證上氣喘息低昂脈浮滑手足溫為順脈沉澀四肢寒者逆上氣脈散者死謂其形損故也歷陳上氣喘咳諸例皆以軟弱緩滑為順澀數堅大者逆蓋緩滑為胃氣尚存堅實為胃氣告遺之脈也病熱有火洪數可醫沉微無火無根者危熱病本屬陽證脈當洪數為順若沉微者陰脈也陽病見陰脈病必危矣骨蒸發熱脈數而虛熱而澀小必殞其軀骨合腎腎能變蒸輕則虛驚蒸蒸而熱微汗耳冷上唇生白泡重則寒熱往來腹痛吐逆等證脈數而虛者順熱而澀小者逆蓋氣血兩虛陰火日熾必至不救勞極諸虛浮濡微弱土敗雙弦火炎急數勞極一證即東垣所謂內傷證也凡疾病在人有另因外感而受病於內者則無非內傷而東垣乃獨以飲食失節勞役不足之病為內傷其故何也蓋外感內傷俱有惡寒發熱等證外感惡寒者即內傷寒也內傷寒熱者即勞役也傷寒以外邪有餘多宜攻散勞役以內傷不足多宜溫補然此二者病多相類最易惑亂故東垣特作內傷二字以為外感之別蓋恐以勞役之傷作傷寒之治則必致誤治矣此其大要所當先辨脈若兩手弦徑此木來剋土如急數者乃陰虛火炎之候也諸病失血脈必見芤緩小可喜數大可憂陰血既亡陽無所附故脈則見芤緩小則胃氣可喜若數大則邪盛方張火爍真陰誠為憂矣瘀血內蓄卻宜牢大沉小澀微反成其害瘀血內蓄脈宜牢大者以其可攻而逐去之則安若沉小澀微則邪實正虛難施峻猛之劑安望速愈耶遺精白濁微澀而弱火盛陰虛芤濡洪數遺精白濁所主不異凡有所注戀而夢者此精為神動也其因在心有欲事不遂而夢者此精失其位也其因在腎在值勞倦即遺者此筋力有不勝肝脾之氣弱也有因用心思慮過度徹遺者此中氣有不足心脾之虛陷也有因濕熱下流相火妄動而遺者此脾腎之火不清也有無故滑而不禁者此下元之虛肺腎之不固也有素稟不足而精易滑者此先天元氣單薄也有久服冷利等劑以致元陽失守而滑泄者此誤藥之所致也有壯年氣盛久節房欲而遺者此滿而溢者也凡此之類是皆遺精之病凡治此者亦當各求所因而致病至若盛而溢者只理飲食調其和平出得自然為固也三消之脈浮大者生細小微澀形脫可驚三消者三焦受病也上消者大渴引飲飲隨渴以消津液經曰二陽為病發心脾其傳為風消中消者多食善飢飢隨食以消瘦經曰心移熱於肺脾其傳為鬲膈火消下消者小便黃赤為膏為淋為便濁面黑耳焦日漸消瘦其病在腎此三症古人悉認為火證然有實火者以邪氣有餘也有虛火者以其陰不足也凡治消症不辨虛實未有不誤者宜深察之小便淋閉鼻頭色黃澀小無血數大何妨鼻頭色黃必主小便難以中焦熱燥腸胃津液枯涸所致也然必枯黃而不澤若黃而明者必有留飲留飲以津液不行穀氣受鬱而致黃也如脈數大而小便不利者乃濕熱所致此氣病而血不病也若脈澀小而利者乃營虛為淋此傷血而不傷氣也二者故別之大便祕結須分氣血陽數而實陰遲而澀祕結一證在古方書有虛風寒熱濕燥等祕立名太繁又無確據不得其要徒滋疑惑不無為臨證之害也不知此證之當辨者惟二曰陰結陽結而書之矣蓋陽結者邪有餘宜攻宜瀉者也陰結者為正氣不足宜補宜滋者也知斯二者即知祕結之綱領矣癲乃重陰狂乃重陽浮洪吉兆沉急凶殃癲狂既分陰陽而脈皆取浮洪者蓋浮洪屬陽在狂病固屬相宜而癲疾乃陰病見陽脈者均為吉兆之義若沉急則陰邪盛極矣故凶殃立至癇脈宜虛實急者惡浮陽沉陰滑痰數熱別録所載五癇曰豬雞牛羊馬者即今人之謂發羊吊也乃痰涎壅塞之頑證驚風之固疾也緣其所由有因受胎時七情六欲驚怖口腹所致者發則眼直目牽口噤流涎肚膨發搐項背反脹腰脊強徑等候宜取耳背後青紋脈刺出血可除病之根矣喉痹之脈數熱遲寒喉痹一證在古方書有十八證之辨人悉指為火然喉雖多由火而復有陰證者不可不察也蓋火有真有假如真火者脈必洪數假火者脈必遲弱也纏喉走馬微伏則難喉證則名目雖多似有不必盡辨者然亦有不可不辨者如雙乳蛾單乳蛾及纏喉走馬之類有不同也蓋腫於咽喉兩傍者為雙蛾腫於一邊者為單蛾若腫突而發於喉間者多以刺出膿血則愈此癰癤之屬也若纏喉走馬則滿片紅腫多不成膿亦不可刺其證急其害速故有走馬之名喉乃丹田之標證屬手少陽脈見微伏則為難治諸風眩暈有火有痰左澀血死右大虛看眩暈一證虛者居其八九而兼火兼痰者不過十中一二耳原其所由則有勞倦過度而暈者有飢飽失時而暈者有嘔吐傷上而暈者有泄瀉傷下而暈者有汗過亡陽而暈者眴目驚心而暈者有焦思不釋而暈者有被毆被辱氣奪而暈者有悲哀痛楚大叫大呼而暈者此皆傷其陽中之陽也又有吐血衄血便血而暈者有膿血癰疽大潰而暈者有金石破傷失血痛苦而暈者有男子縱欲氣隨精去而暈者有女子崩淋産難去血過多而暈者此皆傷其陰中之陰也再若大醉之後濕熱相乘而暈者傷其濕也有大怒之後本肆其強而暈者傷其氣也有痰飲留中治節不行而暈者脾之弱也此亦有餘之中不足也至若老年精衰勞倦日積而忽患不眠忽苦眩暈者此營衛兩虛之致然也由此察之虛實可辨矣頭痛多弦浮風緊寒熱洪濕細緩滑厥痰氣虛弦濡血虛微細腎厥弦堅真痛短澀頭痛有各經之辨凡外感頭痛當察三陽厥陰蓋三陽之脈會於巔頂故仲景傷寒論則為三陽有頭痛厥陰亦有頭痛而太陰少陰則有無頭痛為察脈辨證之法則頭腦額顱三陽俱有所會無不可痛焉然太陽在後陽明在前少陰在側此有各經所主亦外感之所當辨也至若內傷頭痛則不得以三陽為拘矣如內經所言下虛上實過在足少陰巨陽及手少陰少陽皆有之矣腦者陰也髓者骨之充也凡痛在頭腦上豈非少陰之病乎此內證外證之異不可不察也心腹之痛其類有九細遲從吉浮大延久經曰有寒滯而痛有熱鬱而痛有食積而痛有蟲積而痛有瘀血而痛有虛勞而痛有中惡而痛有痰癖而痛有火毒而痛脈若細遲則為氣減舒徐厥邪欲退理當從吉設或浮大正是邪氣方張難以捷效也疝氣弦急積聚在裡牢急者生弱急者死疝氣為病凡少腹睪丸為腫為痛上作無時之屬也但疝症不一如內經所謂狐疝者以其出入不常也有言㿗疝者以其頽腫不仁也有沖疝者以其自少腹上衝而痛也有厥疝者以結氣在陰而氣逆為疝也有疝瘕者以少腹冤熱而痛出白者蠱疝也有六經風氣為疝者感受四時之氣留滯而成也有少陽疝者臟腑不和虛實不調也此七者總皆疝之為義也腰痛之脈多沉而弦兼浮者風兼緊者寒弦滑痰飲濡細腎著大乃腎虛沉實閃肭腰乃腎之府腎與膀胱為表裡在經則屬太陽在臟則屬腎而又為衝任督帶之要會所以凡病腰痛者多由真陰之不足也二曰風痹寒濕者風濕著腰而痛也三曰勞役傷腎四曰墜墮損傷五曰寢臥濕地表裡寒熱之異知斯六者庶乎盡矣而治之亦無難也腳氣有四遲寒數熱浮滑者風濡細者濕陳無擇曰腳氣不專主一氣亦不專主在一經兼有雜生諸病未易分別須尋經絡之乾溼再察脈息之虛實以為治也凡汗走注者為風勝無汗攣急掣痛者為寒勝腫滿重著者為濕勝煩渴燥熱者為暑勝若四氣兼中者但察其多者為勝以施治也痿病肺虛脈多微緩或澀或緊或細或濡痿壞也人有久咳肺受傷損漸見形體消削聲嘶盜汗喘不得臥吐出紫血痰稠腥穢毛髮焦枯嗽時必忍氣須臾輕輕吐痰始覺胸膈不疼否則大痛難堪氣息欲絶奄奄者此癆病成矣其患本不可救然治之得法亦多有可生者但察其胃氣尚存治猶可療療之之法救胃為主培養兼行安其正氣然後執拾餘邪緩病緩醫補中有清清中有補勿伐勿助若有若無始能助效也風寒濕氣合而為痹浮澀而緊三脈乃備痹論曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹蓋風善行而數變成其為病則走注歷節無有定所寒氣勝者為痛痹以氣血感寒筋脈凝澀留而不行滯於經絡為痛也濕氣勝者為著痹以濕氣傷其形體而肢節沉重或麻木不仁留著不移也五疸實熱脈必洪數澀微屬虛切忌發渴論疾診尺篇曰身痛而色微黃齒垢黃爪甲上黃黃疸也五疸者黃疸黃汗疸酒疸谷疸女勞疸也劉宗厚曰按一身盡痛而黃者濕氣勝其病在表若不痛者其病在裡煩燥躁者熱勝也大渴不止者死陽經受病脈必洪數其人戰寒發熱陰經受病脈必澀微其人嘔吐悶亂也脈得諸沉責其有水浮氣與風沉石或里沉數為陽沉遲為陰浮大出厄虛小可驚丹溪曰水腫脈多沉病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲仲景曰病風水證其脈自浮病石水證其脈自沉得效方云水腫脈浮大可保虛小可驚五臟為積六腑為聚實強者生沉細者死難經曰病有積有聚何以別之曰積陰氣也聚陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚積者五臟所生聚者六腑所生積發有常其痛不離其部聚發無常留止無所上下無定因其病或動或靜知其名之為積為聚焉中惡腹痛緊細者生脈若浮大邪氣已深中惡一證以其卒然倒僕四肢厥逆身直如尸口鼻出血心腹刺痛反復不寧者蓋人氣之與天氣皆失守則陽神不聚陰鬼幹人致死之兆也然天地間萬物萬殊莫非五行之化人之臟氣鬼之幹人亦惟此耳癰疽浮散惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不痛陰瘡未潰癰疽不怕洪大已潰癰疽洪大可怕華元化曰癰疽瘡腫之作皆五臟六腑蓄毒不流非獨因營衛閉塞而發也靈樞經曰發內癰內疽者其本經募上肉必浮腫募中必時時隱痛浮腫為癰隱痛為疽此即內癰內疽之徵驗也肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀不宜浮大金匱方淪曰熱在上焦因咳傷肺為肺痿肺痿之病氣口脈數而無力其人口中觸吐涎沫者也若面白而口中辟辟燥咳胸中隱隱而痛寸口脈數而實者此為肺癰之病也脈宜短澀乃肺之本脈也若見浮大則火來剋金卻忌之吐糊吐血腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下陳遠公曰有腹疼口渴左足不伸伸則疼甚手按之猶不可忍人以為腸中生癰也然腸癰大小腸之分屈右足者入腸生癰也屈左足者小腸生癰也但大腸癰易治小腸癰難醫以大腸可瀉小腸難瀉也然得法又何不可瀉哉蓋大腸瀉火從糟粕而出小腸瀉火從溲溺而泄也婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜婦人之脈以血為本血旺則經調而子嗣氣旺則喘泛而難孕身體之盛衰無不肇端於此素問曰婦人手少陰脈動甚者妊子也經曰脈者血之府也血盛則脈滑故腎脈宜之仲景曰婦人脈滑疾而經斷者為有孕聖濟經曰天之德地之氣陰陽之至和流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女是以胎有男女則成有遲早體有陰陽則懷有向背故男動在三月陽性早也女動在五月陰性遲也女胎肖母而懷故母之腹下大上小如箕之覆也男胎面母而懷故母之腹圓突如釜之覆也此皆得理之談所當察也欲産之脈其至離經水下乃産未下勿驚難經曰脈一呼三至曰離經一呼一至亦曰離經婦人欲産者脈皆離經也但夜半覺痛日中即生日中覺痛夜半即生良方云孕婦人月腹痛或作或止名曰弄胎非正産之候或腹雖痛而腰不甚痛非正産之候胎高未陷者非正産之候穀道未挺迸者非正産之候水脬未破水血未出非正産之候水血雖出而腹不痛非正産之候且令熟忍不可坐草務宜膽定安心時際見機而待此謂穩婆之任也新産之脈緩滑為吉實大弦牢有證則逆新産即産後也産後氣血兩傷脈貴和平故脈緩滑為吉若見實大弦牢設有外證則逆少兒之脈六至為平更察色證與虎口紋少兒三歲以下氣血未充經脈未備須看虎口三關紋色其法以食指初節為風關二節為氣關三節為命關紋色在初節為輕二節為重三節則危其色以紫為風熱紅為傷寒青為驚風白為疳積惟黃隱隱而淡紅此為常候若三關多亂紋者為內吊主腹痛吐瀉身熱不食若上唇有白泡珠點者為變蒸若紋直而細者為虛寒少氣多難愈紋粗而顯者多易愈紋中有斷續如流珠者為宿食其紋自外向內者為外感自內向外者為內傷岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也至三歲以上以一指而定三關即三部之診也其脈以六至為準添則為熱減則為寒浮長為風癇浮數風熱浮緊風寒浮遲風虛沉短宿食沉數熱伏沉緊冷痛沉遲虛寒如吐瀉手足溫則易已手足寒則難已其外腮赤目眥紅呵欠頓悶乍涼乍熱四肢厥冷氣粗聲嘶及耳背現紅絲紋縷脈來急數者皆痘疹之候也湯藥這所忌者甚多慎勿漫投貽其咎也奇經八脈其診又別脈有奇常十二經者常脈也所見諸證皆平常無奇其奇經八脈交加中外絡繹諸經所見諸證皆忽起忽伏脈亦倏去倏來故謂之奇舊説以為奇偶之奇恐非至當若爾則不應有陽陰維蹺之偶矣所謂督脈督於身後諸陽任脈任於身前諸陰沖為諸脈之海又為血海陽維維絡諸陽主一身之表陰維維絡諸陰主一身之裡陽蹺得足太陽之別主一身左右諸陽陰蹺得足少陰之別主一身左右諸陰二蹺皆起跟中使人矯捷帶脈橫束季脅約束諸脈為諸經之別貫各有專司蓋人身之氣血常行於十二經而後及八脈若受邪則先傷八脈而後傳以六經所以越人譬之溝渠溝渠滿溢諸經不能復拘也直上直下浮則為督督脈起於下極之俞並於脊裡上至風府項中央之脈督脈也名曰風府入屬於腦陽脈之海也其絡循陰器合篡間繞篡後繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之內中央其脈直上直下而中央或尺寸俱強直而浮者督脈也牢則為沖衝脈起於少腹之內胞中為血之海也其浮於外者起於氣街即氣衝在少腹並足少陰之經難經云並足陽明之經以穴參之足陽明挾臍各二寸而下行與衝脈會於宗筋足少陰挾臍五分而上行針經所載衝脈在腹關元等穴皆屬少陰非陽明挾臍上行至胸中而散衝脈任脈皆起於胞中上循背裡為經絡之海其脈直上直下而中央牢脈者衝脈也緊則任脈任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目絡舌陰脈之海也同足三陰並行腹裡其浮於外者出毛際循關元石門即丹田氣海而歷三腕循膻中至缺盆缺盆之中任脈也名曰天突其脈橫寸口邊丸丸緊細而長或弦出寸口上魚際而丸滑者任脈也寸左右彈陽蹺可決陽蹺起於跟內出外踝直上循股外廉循脅後胛上行肩髆外上挾口吻至目內上行髮際後入風池其脈寸口左右彈浮而細綿綿者陽蹺也尺左右彈陰蹺可別陰蹺起於然谷之後上內踝之上直上循陰股入陰中循胸裡入缺盆上出人迎之前入鼻屬目內眥至咽喉交貫衝脈其脈尺內左右彈沉而細綿綿者陰蹺也關左右彈帶脈當決帶脈起於季脅圍身一周如束帶然與足少陰會於十四椎自上數下第十四椎十二經與奇經七脈皆周流上下惟帶脈橫束如衝脈沖督任三脈同起而並行一源而三歧皆絡帶脈其脈中部左右彈而橫滑者帶脈也尺外斜上至寸陰維陰維起於諸陰之交諸陰皆交於胸主持營血其脈發於足少陰內踝循股內廉上行入少腹會足三陰上腹裡去腹中行四寸半循脅會足厥於期門直乳一寸半上胸脅挾咽與任脈會於頸其脈從尺外斜上至寸而沉實者陰維也尺內斜上至於陽維陽維起於諸陽之會諸陽皆會於頭主持衛氣其脈發於足太陽外踝循膝外廉上髀關抵少腹別循脅筋斜上肘會手足太陽陽蹺於臑俞上循耳會督脈於氣府上腦空下至風池與諸陽會於頭其脈從尺內斜上至寸而浮者陽維也督脈為病脊強癲癇督脈動苦少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾卒口噤背反張瘛瘲腰脊強痛不得俯仰頭重不舉大人癲疾少兒風癇任脈為病七疝瘕聚任脈動苦少腹繞臍引陰中切痛入房太過沖督任受傷多此男子內結七疝女子帶下瘕聚月事不以時下腹皮急腹中有氣如指上搶心不得俯仰拘急志欲不遂陰火上乘多此衝脈為病逆氣裡急衝脈動苦逆氣裡急氣上衝咽喉不得息喘息不得臥腹中刺痛拘急寒氣客於衝脈則脈不通喘動應手有寒疝痛則上引胸中痛帶主帶下臍痛精失帶脈動苦腹滿腰溶溶若在水中溶溶緩縱貌腹縱如囊水伏婦人腰痛少腹痛裡急瘛瘲牽引季脅下空軟處月事不調赤白帶下陽維寒熱目眩僵仆陽維動苦寒熱陽維為病在表故苦寒熱而足太陽少陽始終聯附故二經為病苦寒熱腰痛痛上怫然腫又腰痛不可以咳咳則筋縮急肌肉痹癢皮膚痛下部不仁汗出而寒羊癇倒僕多發於日手足相引甚者不能言若陽維不能維於陽則溶溶不能自收持陰維心痛胸脅刺築陰維動苦心痛陰維為病在裡故苦心痛陰維雖交三陰與任脈同歸故心痛腹痛多屬少陰維任脈也脅滿腰痛甚則悲以恐癲疾失音多發於夜肌肉痹癢汗出惡風身灑灑然若陰維不能維於陰則悵然失志陽蹺為病陰緩陽急陽蹺動苦縱緩不收陰緩而陽急陽蹺脈急當從外踝以上急內踝以上緩腰背痛羊倒僕多發於日惡風偏枯瘡瘍體痹目嗔不得瞑陰蹺為病陽緩陰急陰蹺動苦拘急不弛陽緩而陰急陰蹺脈急當從內踝以上急外踝以上緩少腹痛裡急腰痛相引陰中男子陰疝女子漏下不止癲疝寒熱多發於夜皮膚淫痹風痙目閉不得開癲癇瘛瘲寒熱恍惚八脈之證各有所屬癲顛倒錯亂也癇有風痰邪氣驚搐兼虛也其證有五畜配五臟心癇其聲如羊肝癇其聲如犬脾癇其聲如生肺癇其聲如雞腎癇其聲如豬發則卒然倒僕口眼相引手足搐搦口吐涎沫食頃乃蘇瘛主搐搦狂病也瘲主縱緩風病也平人無脈移於外絡兄位弟乘陽溪列缺列缺在手腕後側上一寸五分滑伯仁曰以手交叉當食指未筋骨罅中是穴此手太陰之絡從腕後別走陽明直出食指內廉出其端凡人寸關尺三部不見脈而脈見於列缺者謂之反關脈此經脈虛而絡脈滿也病脈既明吉凶當別經脈之外又有真脈黃帝曰見真藏脈曰死何謂也岐伯曰五臟者皆稟氣於胃胃五臟之本也臟氣者不能自至於手太陰必因於胃氣乃至於手太陰也邪氣勝則精氣衰胃氣不能與之故真藏之氣獨見者病勝臟也故曰死肝絶之脈循刀責責肝絶之脈中外弦徑而急如循刀責責然色青白不澤乃余來剋木也心絶之脈轉豆躁疾心絶之脈短促躁疾如轉豆纍纍然色赤黑不澤乃水來剋火也脾則雀啄如屋之漏如水之流如杯之覆脾絶之脈乍疏乍數如雀啄食連三五至一止復來如屋之殘漏良久一滴如水之墮流點滴無倫如覆杯之傾瀉去而不返也色黃青不澤乃木來剋土也肺絶如毛無根蕭索麻子動搖浮波之滑肺絶之脈羽毛麻子浮波者皆是飄浮無根之脈也色白赤不澤乃火來剋金也腎脈將絶至如省客來如彈石去如解索腎絶之脈沉實如彈石劈劈然如省客之無常如解索散亂面無序色黑黃不澤乃土來剋水也命脈將絶蝦遊魚翔至如湧泉絶在膀胱命絶之脈如蝦遊魚翔者則脈浮泛於上而乖違其就下之常也湧泉者有升無降有出無入勢甚洶湧莫能遏御也真脈既形胃已無氣參察色證斷之以臆既明真藏脈也參察胃氣之有無則順逆吉凶生死之法胸次瞭然心目矣
